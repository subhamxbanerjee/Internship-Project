# =========================
# Database Configuration
# =========================
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/centuryply?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# =========================
# JPA / Hibernate
# =========================
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# =========================
# File Upload
# =========================
spring.servlet.multipart.max-file-size=${MAX_UPLOAD_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_SIZE:50MB}

# =========================
# Jackson
# =========================
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

# =========================
# Application
# =========================
portal.upload-dir=${UPLOAD_DIR:uploads}
portal.seed-demo-data=${SEED_DEMO_DATA:false}

# During deployment/testing
# Change this later to your frontend URL if needed.
portal.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://192.168.25.137:8081}

# =========================
# Server Configuration
# =========================
server.address=0.0.0.0
server.port=8081
logging.level.com.centuryply.portal=DEBUG
logging.level.org.springframework.security=INFO

server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
spring.web.resources.cache.cachecontrol.no-store=true
spring.web.resources.cache.cachecontrol.must-revalidate=true
spring.web.resources.cache.cachecontrol.no-cache=true